name: C Build & Test

on:
  push:
    branches: [ "main" ]
    paths:
      - 'C/**'
      - '!C/**.md'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'C/**'
      - '!C/**.md'

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          libssl-dev \
          libncursesw5-dev \
          gcc \
          make

    - name: Build
      working-directory: ./C
      run: make -j$(nproc)

    - name: Run test suite
      working-directory: ./C
      run: bash test_runner.sh

    - name: Verify binary
      run: ./C/hermes --version 2>&1 || ./C/hermes --help 2>&1 | head -5
